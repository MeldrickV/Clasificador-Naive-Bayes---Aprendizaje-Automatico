name: Build and Release

on:
  push:
    tags:
      - 'v*'               # Se ejecuta cuando se pushea un tag como v1.0.0
  workflow_dispatch:       # También se puede lanzar manualmente

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      exe_name: ${{ steps.set_name.outputs.exe_name }}
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Obtener nombre del ejecutable
        id: set_name
        run: echo "exe_name=Clasificador-NB-Windows.exe" >> $env:GITHUB_OUTPUT

      - name: Compilar Windows
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "${{ steps.set_name.outputs.exe_name }}" main.py

      - name: Subir artefacto (para pasar al release)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/${{ steps.set_name.outputs.exe_name }}

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      bin_name: ${{ steps.set_name.outputs.bin_name }}
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Obtener nombre del binario
        id: set_name
        run: echo "bin_name=Clasificador-NB-Linux" >> $GITHUB_OUTPUT

      - name: Compilar Linux
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "${{ steps.set_name.outputs.bin_name }}" main.py

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: dist/${{ steps.set_name.outputs.bin_name }}

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Necesario para crear releases y subir assets
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Listar archivos descargados
        run: ls -R artifacts

      - name: Crear Release y subir assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-exe/*
            artifacts/linux-bin/*
          draft: false
          prerelease: false
          generate_release_notes: true   # Opcional: genera notas automáticas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
